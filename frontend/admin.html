<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CRM Ломбарду</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h1>CRM Панель ломбарду</h1>

<hr>

<ul class="nav nav-tabs">

<li class="nav-item">
<a class="nav-link active" onclick="show('requests')">Заявки</a>
</li>

<li class="nav-item">
<a class="nav-link" onclick="show('products')">Товари</a>
</li>

<li class="nav-item">
<a class="nav-link" onclick="show('users')">Клієнти</a>
</li>

</ul>

<br>

<div id="requests"></div>
<div id="products" style="display:none"></div>
<div id="users" style="display:none"></div>

<script>

function show(section){

document.getElementById("requests").style.display="none"
document.getElementById("products").style.display="none"
document.getElementById("users").style.display="none"

document.getElementById(section).style.display="block"

}

// ---------- REQUESTS ----------

let allRequests = []

async function loadRequests(){

const response = await fetch("/api/requests")
const data = await response.json()

allRequests = data

renderRequests(data)

}

function renderRequests(data){

let html = `

<h3>Заявки</h3>

<input class="form-control mb-3"
placeholder="Пошук заявки..."
onkeyup="searchRequests(this.value)">

<select class="form-control mb-3"
onchange="filterStatus(this.value)">

<option value="all">Усі заявки</option>
<option value="new">Нові</option>
<option value="approved">Прийняті</option>
<option value="rejected">Відхилені</option>

</select>

<table class="table table-bordered">

<tr>
<th>Клієнт</th>
<th>Предмет</th>
<th>Сума</th>
<th>Статус</th>
</tr>

`

data.forEach(r=>{

html += `
<tr>
<td>${r.user}</td>
<td>${r.item}</td>
<td>${r.price}</td>
<td>${r.status}</td>
</tr>
`

})

html += "</table>"

document.getElementById("requests").innerHTML = html

}

function searchRequests(text){

text = text.toLowerCase()

const filtered = allRequests.filter(r =>

r.user.toLowerCase().includes(text) ||
r.item.toLowerCase().includes(text) ||
String(r.price).includes(text)

)

renderRequests(filtered)

}

function filterStatus(status){

if(status === "all"){
renderRequests(allRequests)
return
}

const filtered = allRequests.filter(r => r.status === status)

renderRequests(filtered)

}

// ---------- PRODUCTS ----------

async function loadProducts(){

const response = await fetch("/api/products")
const data = await response.json()

let html = `

<h3>Товари</h3>

<form id="productForm" class="card p-3 mb-4">

<h5>Додати товар</h5>

<input name="name" class="form-control mb-2" placeholder="Назва">

<input name="price" class="form-control mb-2" placeholder="Ціна">

<input name="description" class="form-control mb-2" placeholder="Опис">

<input name="image" type="file" class="form-control mb-2">

<button class="btn btn-success">Додати товар</button>

</form>

<div class="row">

`

data.forEach(p=>{

html += `
<div class="col-3">

<div class="card p-2">

<img src="${p.image || 'https://via.placeholder.com/200'}" width="100%">

<h5>${p.name}</h5>

<p>${p.price} грн</p>

<button class="btn btn-danger btn-sm"
onclick="deleteProduct('${p._id}')">
Видалити
</button>

</div>

</div>
`

})

html += "</div>"

document.getElementById("products").innerHTML = html

}

// ---------- ADD PRODUCT WITH IMAGE ----------

document.addEventListener("submit", async function(e){

if(e.target.id !== "productForm") return

e.preventDefault()

const formData = new FormData(e.target)

await fetch("/api/product",{
method:"POST",
body:formData
})

e.target.reset()

loadProducts()

})

// ---------- DELETE PRODUCT ----------

async function deleteProduct(id){

await fetch("/api/product/"+id,{
method:"DELETE"
})

loadProducts()

}

// ---------- USERS ----------

async function loadUsers(){

const response = await fetch("/api/users")
const data = await response.json()

let html = `
<h3>Клієнти</h3>

<table class="table table-bordered">

<tr>
<th>Email</th>
<th>Роль</th>
</tr>
`

data.forEach(u=>{

html += `
<tr>
<td>${u.email}</td>
<td>${u.role}</td>
</tr>
`

})

html += "</table>"

document.getElementById("users").innerHTML = html

}

// ---------- LOAD DATA ----------

loadRequests()
loadProducts()
loadUsers()

</script>

</body>
</html>
