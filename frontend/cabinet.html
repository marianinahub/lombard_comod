<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Кабінет</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Кабінет клієнта</h1>

<p id="user"></p>

<a href="request.html" class="btn btn-primary">Створити заявку</a>

<br><br>

<h3>Мої заявки</h3>

<table class="table table-bordered">

<thead>
<tr>
<th>Предмет</th>
<th>Сума</th>
<th>Статус</th>
</tr>
</thead>

<tbody id="requests"></tbody>

</table>
<a href="payment.html" class="btn btn-success">
Оплатити позику
</a>
<script>

const user = localStorage.getItem("user")

document.getElementById("user").innerText = "Ви увійшли як: " + user

async function loadRequests(){

  const response = await fetch("/api/my-requests/" + user)

  const data = await response.json()

  const table = document.getElementById("requests")

  table.innerHTML = ""

  data.forEach(req => {

    const row = document.createElement("tr")

    row.innerHTML = `
      <td>${req.item}</td>
      <td>${req.price}</td>
      <td>${req.status}</td>
    `

    table.appendChild(row)

  })

}

loadRequests()

</script>

</body>
</html>
