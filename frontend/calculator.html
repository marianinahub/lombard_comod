<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Калькулятор ломбарду</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Калькулятор ломбарду</h1>

<div class="card p-4">

<label>Сума позики</label>
<input id="amount" class="form-control">

<br>

<label>Кількість днів</label>
<input id="days" class="form-control">

<br>

<button class="btn btn-primary" onclick="calculate()">Розрахувати</button>

<hr>

<h4>Відсоток: <span id="percent"></span>%</h4>
<h4>Відсотки: <span id="interest"></span> грн</h4>
<h3>До повернення: <span id="total"></span> грн</h3>

</div>

<br>

<h3>Графік нарахування</h3>

<table class="table table-bordered">

<thead>
<tr>
<th>День</th>
<th>Сума боргу</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

function getPercent(amount){

if(amount <= 2000) return 1.05
if(amount <= 5000) return 1
if(amount <= 10000) return 0.86
if(amount <= 20000) return 0.60

return 0.50

}

function calculate(){

const amount = Number(document.getElementById("amount").value)
const days = Number(document.getElementById("days").value)

const percent = getPercent(amount)

const interest = amount * percent / 100 * days
const total = amount + interest

document.getElementById("percent").innerText = percent
document.getElementById("interest").innerText = interest.toFixed(2)
document.getElementById("total").innerText = total.toFixed(2)

const table = document.getElementById("table")

table.innerHTML = ""

for(let day=1; day<=days; day++){

const debt = amount + (amount * percent / 100 * day)

const row = document.createElement("tr")

row.innerHTML = `
<td>${day}</td>
<td>${debt.toFixed(2)} грн</td>
`

table.appendChild(row)

}

}

</script>

</body>
</html>
