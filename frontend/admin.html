<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Адмін панель</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="container mt-5">

<h1 class="mb-4">Адмін панель ломбарду</h1>
<div class="row mb-4">

<div class="col">
<div class="card text-bg-primary p-3">
<h4>Клієнти</h4>
<h2 id="users"></h2>
</div>
</div>

<div class="col">
<div class="card text-bg-success p-3">
<h4>Заявки</h4>
<h2 id="requestsCount"></h2>
</div>
</div>

<div class="col">
<div class="card text-bg-warning p-3">
<h4>Товари</h4>
<h2 id="products"></h2>
</div>
</div>

<div class="col">
<div class="card text-bg-danger p-3">
<h4>Сума заявок</h4>
<h2 id="total"></h2>
</div>
</div>

</div>
<div class="card p-4 mt-4">

<h3>Статистика ломбарду</h3>

<canvas id="statsChart"></canvas>

</div>
<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>Клієнт</th>
<th>Предмет</th>
<th>Сума</th>
<th>Статус</th>
<th>Дії</th>
</tr>
</thead>

<tbody id="requests"></tbody>

</table>

<script>
  const role = localStorage.getItem("role")

if(role !== "admin"){
  alert("Доступ заборонено")
  window.location.href = "index.html"
}

  async function loadChart(){

  const response = await fetch("/api/stats")
  const data = await response.json()

  const ctx = document.getElementById("statsChart")

  new Chart(ctx,{

    type:"bar",

    data:{
      labels:["Клієнти","Заявки","Товари"],

      datasets:[{
        label:"Статистика системи",

        data:[
          data.users,
          data.requests,
          data.products
        ],

        backgroundColor:[
          "#3498db",
          "#2ecc71",
          "#f1c40f"
        ]

      }]
    }

  })

}

loadChart()
  async function loadStats(){

  const response = await fetch("/api/stats")
  const data = await response.json()

  document.getElementById("users").innerText = data.users
  document.getElementById("requestsCount").innerText = data.requests
  document.getElementById("products").innerText = data.products
  document.getElementById("total").innerText = data.total + " грн"

}

loadStats()

async function loadRequests(){

  const response = await fetch("/api/requests")
  const data = await response.json()

  const table = document.getElementById("requests")

  table.innerHTML = ""

  data.forEach(req => {

    const row = document.createElement("tr")

    row.innerHTML = `
      <td>${req.user}</td>
      <td>${req.item}</td>
      <td>${req.price}</td>
      <td>${req.status}</td>
      <td>
        <button class="btn btn-success btn-sm" onclick="updateStatus('${req._id}','approved')">Прийняти</button>
        <button class="btn btn-danger btn-sm" onclick="updateStatus('${req._id}','rejected')">Відхилити</button>
      </td>
    `

    table.appendChild(row)

  })

}

async function updateStatus(id,status){

  await fetch("/api/request/status",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({id,status})
  })

  loadRequests()

}

loadRequests()


</script>

</body>
</html>
